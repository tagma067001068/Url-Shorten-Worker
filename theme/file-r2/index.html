<!doctype html>
<html>
<head>
  <meta http-equiv="content-type" content="txt/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <title>File Hosting (R2)</title>
  <link rel="stylesheet" href="https://crazypeace.github.io/Url-Shorten-Worker/styles.css">
</head>
<body>
  <div class="d-flex align-items-start flex-wrap">

  <!-- 文件选择 + 上传 -->
  <div class="card shadow m-3">
    <h5 class="card-header">选择文件并上传到 R2</h5>
    <div class="card-body">
      <div class="mb-3">
        <label for="input_file" class="form-label">选择文件</label>
        <input class="form-control" type="file" id="input_file">
      </div>

      <div class="mb-3">
        <button class="btn btn-warning" type="button" onclick='uploadToR2()' id="uploadBtn" disabled>上传到 R2</button>
      </div>

      <!-- 上传进度条 -->
      <div class="mb-3" id="progressWrap" style="display:none;">
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width: 0%">0%</div>
        </div>
        <small class="text-muted mt-1" id="progressText"></small>
      </div>
    </div>
  </div>

  <!-- 保存到 KV（复用 imghost 布局） -->
  <div class="card shadow m-3">
    <h5 class="card-header">文件保管站 File Hosting (R2)</h5>
    <div class="card-body">
      <div class="input-group mb-3">
        <div class="form-floating mb-3">
          <textarea class="form-control" placeholder="" id="longURL" oninput="loadUrlList()"></textarea>
          <label for="longURL">R2 URL（上传后自动填入）</label>
        </div>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon2">文件名</span>
        <input type="text" class="form-control" id="keyPhrase" aria-describedby="basic-addon2" placeholder="上传后自动填入">
      </div>

      <div class="input-group mb-3">
        <button class="btn btn-primary" type="button" onclick='shorturl()' id="addBtn">保存</button>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon3">本系统密码</span>
        <input class="form-control" type="text" value="__PASSWORD__" readonly="true" id="passwordText" aria-describedby="basic-addon3">
      </div>

      <!-- R2 S3 配置 (由 Worker 注入真实值, 隐藏) -->
      <input type="hidden" id="r2AccountId"       value="__R2_ACCOUNT_ID__">
      <input type="hidden" id="r2AccessKeyId"      value="__R2_ACCESS_KEY_ID__">
      <input type="hidden" id="r2SecretAccessKey"  value="__R2_SECRET_ACCESS_KEY__">
      <input type="hidden" id="r2BucketName"       value="__R2_BUCKET_NAME__">
      <input type="hidden" id="r2PublicUrl"        value="__R2_PUBLIC_URL__">
    </div>
    
    <div class="card-footer">
      <span> <a href="https://github.com/crazypeace/Url-Shorten-Worker/" target="_self">Fork me on GitHub</a> </span>
    </div>
  </div>

  <!-- LocalStorage List -->
  <div class="card shadow m-3">
    <h5 class="card-header">LocalStorage List</h5>
    <div class="card-body">
      <div class="input-group mb-3">
        <button class="btn btn-success" type="button" onclick='loadUrlList()' id="loadListBtn">load localStorage</button>
        <button class="btn btn-danger" type="button" onclick='clearLocalStorage()' id="clearlocalStgBtn">clear localStorage</button>
        <button class="btn btn-info" type="button" onclick='loadKV()' id="loadKV2localStgBtn">load KV to localStorage</button>
      </div>

      <div class="card-text">
        <div classs="list-group" id="urlList">
          <div class="mb-3 list-group-item">
            <div class="input-group">
              <button type="button" class="btn btn-danger" onclick='deleteShortUrl("4sure")' id="delBtn-4sure">X</button>
              <button type="button" class="btn btn-info" onclick='queryVisitCount("4sure")' id="qryCntBtn-4sure">?</button>
              <span class="form-control">https://1way.eu.org/4sure</span>
            </div>
            <div class="form-control">
              https://en.y2mate.is/s36/youtube-to-mp3.html
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- Result Modal -->
  <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="resultModalLabel">Result</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="result">No result</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick='copyurl("result")' data-bs-toggle="popover" data-bs-placement="bottom" data-bs-content="Copied!">Copy</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/gh/lrsjng/jquery-qrcode@0.18.0/dist/jquery-qrcode.min.js" crossorigin="anonymous"></script>

  <script src="https://crazypeace.github.io/Url-Shorten-Worker/main.js" crossorigin="anonymous"></script>

  <!-- R2 S3 前端直连 -->
  <script src="https://crazypeace.github.io/Url-Shorten-Worker/r2-s3.js" crossorigin="anonymous"></script>

  <!-- file-r2 逻辑 -->
  <script src="https://crazypeace.github.io/Url-Shorten-Worker/file-r2.js" crossorigin="anonymous"></script>

  <script>
    // 覆盖 buildValueItemFunc: 缩略图 512px, 不判断文件类型, 失败就失败
    // 用户需在 R2 自定义域名上开启 Image Transformations
    // 函数的定义在 main.js 中
    (function() {
      var IMG_MAX = 512;

      function thumbUrl(r2Url) {
        try {
          var u = new URL(r2Url);
          return u.origin + "/cdn-cgi/image/width=" + IMG_MAX + ",quality=75,format=auto" + u.pathname;
        } catch(e) {
          return r2Url;
        }
      }

      buildValueItemFunc = function(longUrl) {
        var wrap = document.createElement('div');
        wrap.classList.add("form-control", "rounded-top-0");

        var img = document.createElement('img');
        img.src = thumbUrl(longUrl);
        img.style.cssText = "max-width:" + IMG_MAX + "px;max-height:" + IMG_MAX + "px;border-radius:6px;cursor:pointer;display:block;";
        img.title = '点击查看原图';
        img.onerror = function() { img.remove(); };
        img.onclick = function() { window.open(longUrl, '_blank'); };
        wrap.appendChild(img);

        var txt = document.createElement('small');
        txt.style.cssText = 'word-break:break-all;display:block;margin-top:4px;opacity:0.7;';
        txt.innerText = longUrl;
        wrap.appendChild(txt);

        return wrap;
      };
    })();
  </script>
</body>
</html>
